[supervisord]
nodaemon=true

[program:celery-batch_update]
command=celery -A src.tasks.batch.update.tasks worker --loglevel=info -Q batch_update --concurrency=10 --statedb=/app/worker-batch_update.state
directory=/app
autostart=true
autorestart=true
stderr_logfile=/app/app-batch_update.log
stdout_logfile=/app/app-batch_update.log

